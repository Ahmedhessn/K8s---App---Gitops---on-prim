apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker1
      containers:
        - name: rabbitmq
          env:
            - name: RABBITMQ_MNESIA_DIR
              value: /var/lib/rabbitmq/mnesia/clean_prod_v1
