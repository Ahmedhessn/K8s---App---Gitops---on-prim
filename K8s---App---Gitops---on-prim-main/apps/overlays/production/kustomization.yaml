apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vprofile

resources:
  - ../../base
  - namespace.yaml

labels:
  - pairs:
      environment: production
    includeSelectors: false

patches:
  - path: rabbitmq-patch.yaml
  - target:
      kind: Ingress
      name: apps-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: el30mda.local
