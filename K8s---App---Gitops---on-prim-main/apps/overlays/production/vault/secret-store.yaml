# يتطلب External Secrets Operator — راجع platform/external-secrets/README.md
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  labels:
    app.kubernetes.io/component: vault-auth
spec:
  provider:
    vault:
      # بعد helm install — راجع platform/vault/install.md
      # dev (TLS off):  http://vault.vault.svc.cluster.local:8200
      # prod + TLS:     https://vault.vault.svc.cluster.local:8200
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: vprofile-mysql
          serviceAccountRef:
            name: vault-mysql
