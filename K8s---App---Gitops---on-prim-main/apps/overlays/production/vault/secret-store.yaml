# يتطلب External Secrets Operator — راجع platform/external-secrets/README.md
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  labels:
    app.kubernetes.io/component: vault-auth
spec:
  provider:
    vault:
      # TODO: غيّر لعنوان Vault عندكم
      server: https://vault.el30mda.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: vprofile-mysql
          serviceAccountRef:
            name: vault-mysql
