apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vprofile-dev

resources:
  - ../../base
  - namespace.yaml
  - vault/serviceaccount.yaml
  - vault/secret-store.yaml
  - vault/mysql-external-secret.yaml

labels:
  - pairs:
      environment: development
    includeSelectors: false

patches:
  - path: rabbitmq-patch.yaml
  - target:
      kind: Ingress
      name: apps-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev.el30mda.local
