apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  template:
    spec:
      containers:
        - name: rabbitmq
          env:
            - name: RABBITMQ_MNESIA_DIR
              value: /var/lib/rabbitmq/mnesia/clean_dev_v1
          resources:
            requests:
              memory: 256Mi
